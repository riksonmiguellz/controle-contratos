<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Controle de Contratos · Fortuna AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F5FA; --panel:#FFFFFF; --panel-2:#FBFAFD; --ink:#191526; --ink-soft:#5B5470;
  --line:#E7E3F0; --line-strong:#D8D2E6;
  --violet:#6D3BF5; --violet-soft:#8B63FF; --violet-tint:#F0EAFF; --navy:#1C2E4A;
  --ok:#12A150; --ok-tint:#E5F5EC; --warn:#C67C00; --warn-tint:#FBF0DC;
  --crit:#D62F2F; --crit-tint:#FBE6E6; --info:#2563C9; --info-tint:#E5EEFB;
  --shadow:0 1px 2px rgba(25,21,38,.06),0 8px 24px rgba(25,21,38,.06); --radius:14px;
}
@media (prefers-color-scheme:dark){:root{
  --bg:#0C0913; --panel:#151021; --panel-2:#1B1530; --ink:#F3F0FA; --ink-soft:#A79FBE;
  --line:#271F3D; --line-strong:#352A50; --violet:#9D7BFF; --violet-soft:#B399FF; --violet-tint:#221838; --navy:#9FB4D6;
  --ok:#3DD07E; --ok-tint:#12271C; --warn:#F0B24B; --warn-tint:#2E2411; --crit:#FF6B6B; --crit-tint:#301518; --info:#6BA5FF; --info-tint:#122238;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.35);
}}
:root[data-theme="light"]{--bg:#F6F5FA;--panel:#FFFFFF;--panel-2:#FBFAFD;--ink:#191526;--ink-soft:#5B5470;--line:#E7E3F0;--line-strong:#D8D2E6;--violet:#6D3BF5;--violet-soft:#8B63FF;--violet-tint:#F0EAFF;--navy:#1C2E4A;--ok:#12A150;--ok-tint:#E5F5EC;--warn:#C67C00;--warn-tint:#FBF0DC;--crit:#D62F2F;--crit-tint:#FBE6E6;--info:#2563C9;--info-tint:#E5EEFB;--shadow:0 1px 2px rgba(25,21,38,.06),0 8px 24px rgba(25,21,38,.06);}
:root[data-theme="dark"]{--bg:#0C0913;--panel:#151021;--panel-2:#1B1530;--ink:#F3F0FA;--ink-soft:#A79FBE;--line:#271F3D;--line-strong:#352A50;--violet:#9D7BFF;--violet-soft:#B399FF;--violet-tint:#221838;--navy:#9FB4D6;--ok:#3DD07E;--ok-tint:#12271C;--warn:#F0B24B;--warn-tint:#2E2411;--crit:#FF6B6B;--crit-tint:#301518;--info:#6BA5FF;--info-tint:#122238;--shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.35);}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:"Inter","Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3{margin:0;letter-spacing:-.015em;text-wrap:balance;font-family:"Montserrat","Inter",system-ui,sans-serif;font-weight:700}
.brand,.bd,.brand-dot,.pill-role,.kpi .lab,.eyebrow{font-family:"Montserrat","Inter",system-ui,sans-serif}
/* ===== FORTUNA AI — identidade premium ===== */
@media (prefers-color-scheme:dark){:root{--bg:#0A0616;--panel:#150D28;--panel-2:#1C1236;--line:#2A1E45;--line-strong:#3A2A5C;}}
:root[data-theme="dark"]{--bg:#0A0616;--panel:#150D28;--panel-2:#1C1236;--line:#2A1E45;--line-strong:#3A2A5C;}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--violet);opacity:.9;margin-bottom:14px}
.brand-dot,.bd{background:linear-gradient(140deg,#8B63FF,#6D3BF5 45%,#3A1D8C);box-shadow:0 6px 22px -4px color-mix(in srgb,var(--violet) 70%,transparent),inset 0 1px 0 rgba(255,255,255,.25)}
.gate{position:relative;overflow:hidden}
.gate::before{content:"";position:absolute;top:-30%;left:50%;transform:translateX(-50%);width:680px;height:520px;
  background:radial-gradient(closest-side,color-mix(in srgb,var(--violet) 30%,transparent),transparent 70%);pointer-events:none;filter:blur(10px)}
.gate-card{position:relative;z-index:1}
:root[data-theme="dark"] .gate-card,@media(prefers-color-scheme:dark){.gate-card{box-shadow:0 20px 60px -18px rgba(109,59,245,.45),0 1px 0 rgba(255,255,255,.04) inset}}
.kpi.accent{background:linear-gradient(135deg,#7C4DFF,#5A2CC9 55%,#231152);box-shadow:0 14px 34px -12px color-mix(in srgb,var(--violet) 65%,transparent)}
.wordmark{font-family:"Montserrat",sans-serif;font-weight:800;letter-spacing:.02em}
.wordmark b{color:var(--violet)}
/* ===== tela de acesso (clara, command-center) ===== */
#bgfx{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:0}
.gate{background:radial-gradient(120% 90% at 50% -10%, #F1EBFF 0%, #F7F6FB 55%, #EEEAF8 100%)}
.gate::before{display:none}
.gate-card{position:relative;z-index:2;background:rgba(255,255,255,.82);backdrop-filter:blur(14px) saturate(1.1);border:1px solid rgba(109,59,245,.14);box-shadow:0 24px 70px -26px rgba(109,59,245,.32), 0 2px 10px rgba(25,21,38,.05)}
/* facepile da equipe */
.gate-team{margin-top:20px;border-top:1px solid var(--line);padding-top:16px}
.gate-team-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);font-weight:700;margin-bottom:11px;display:flex;align-items:center;gap:7px;justify-content:center}
.gate-avatars{display:flex;flex-wrap:wrap;justify-content:center;gap:0}
.gate-avatars .ga{width:38px;height:38px;border-radius:50%;border:2px solid #fff;margin-left:-9px;background:var(--violet-tint);color:var(--violet);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;overflow:hidden;font-family:"Montserrat",sans-serif;box-shadow:0 2px 7px rgba(25,21,38,.14);transition:transform .15s ease}
.gate-avatars .ga:first-child{margin-left:0}
.gate-avatars .ga:hover{transform:translateY(-3px) scale(1.06);z-index:3}
.gate-avatars .ga img{width:100%;height:100%;object-fit:cover}
.gate-avatars .ga.more{background:var(--violet);color:#fff;font-size:12px}
/* nuvem viva */
.cloud-dot{width:8px;height:8px;border-radius:50%;background:var(--ink-soft);display:inline-block;flex-shrink:0}
.mode-tag.cloud-on{border-color:rgba(18,161,80,.35);color:#0b7a3e;background:rgba(18,161,80,.10)}
.mode-tag.cloud-on .cloud-dot{background:#12A150;animation:pulseDot 1.8s infinite}
.mode-tag.cloud-off{border-color:rgba(214,47,47,.30);color:var(--crit);background:var(--crit-tint)}
.mode-tag.cloud-off .cloud-dot{background:var(--crit)}
#gate .mode-tag{animation:floaty 3.4s ease-in-out infinite}
@keyframes pulseDot{0%{box-shadow:0 0 0 0 rgba(18,161,80,.5)}70%{box-shadow:0 0 0 7px rgba(18,161,80,0)}100%{box-shadow:0 0 0 0 rgba(18,161,80,0)}}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
button{font-family:inherit;cursor:pointer}
.mono{font-variant-numeric:tabular-nums}
.hidden{display:none !important}
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.gate-card{width:100%;max-width:452px;background:var(--panel);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:38px 34px;text-align:center}
.brand-dot{width:46px;height:46px;border-radius:13px;margin:0 auto 18px;background:linear-gradient(135deg,var(--violet),var(--navy));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px}
.gate h1{font-size:22px;margin-bottom:6px}
.gate .sub{color:var(--ink-soft);font-size:14px;margin-bottom:24px}
.gate .roles{display:flex;flex-direction:column;gap:12px}
.role-btn{border:1px solid var(--line-strong);background:var(--panel-2);color:var(--ink);border-radius:12px;padding:15px 16px;text-align:left;display:flex;gap:13px;align-items:center;transition:.15s}
.role-btn:hover{border-color:var(--violet);background:var(--violet-tint)}
.role-btn .ic{font-size:20px}
.role-btn .t{font-weight:650}
.role-btn .d{font-size:12.5px;color:var(--ink-soft)}
.pw-row{display:none;margin-top:14px;flex-direction:column;gap:8px}
.pw-row.show{display:flex}
input,select,textarea{font-family:inherit;font-size:14.5px;color:var(--ink);background:var(--panel-2);border:1px solid var(--line-strong);border-radius:10px;padding:11px 12px;width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--violet);outline-offset:1px;border-color:var(--violet)}
.btn{border:1px solid transparent;border-radius:10px;padding:11px 16px;font-weight:650;font-size:14px;background:var(--violet);color:#fff;transition:.15s;white-space:nowrap}
.btn:hover{filter:brightness(1.07)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.ghost{background:transparent;color:var(--ink);border-color:var(--line-strong)}
.btn.ghost:hover{border-color:var(--violet);color:var(--violet)}
.btn.sm{padding:7px 11px;font-size:13px}
.btn.danger{background:var(--crit)}
.err{color:var(--crit);font-size:13px;margin-top:10px;min-height:16px}
.mode-tag{display:inline-flex;gap:6px;align-items:center;font-size:11.5px;font-weight:650;padding:4px 10px;border-radius:999px;background:var(--panel-2);border:1px solid var(--line-strong);color:var(--ink-soft);margin-bottom:18px}
.topbar{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--panel) 88%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:12px 22px;flex-wrap:wrap}
.topbar .brand{display:flex;align-items:center;gap:11px;font-weight:750}
.topbar .brand .bd{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--violet),var(--navy));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px}
.topbar .spacer{flex:1}
.pill-role{font-size:12px;font-weight:650;padding:5px 11px;border-radius:999px;background:var(--violet-tint);color:var(--violet);border:1px solid color-mix(in srgb,var(--violet) 30%,transparent)}
.pill-mode{font-size:11.5px;font-weight:650;padding:5px 10px;border-radius:999px;border:1px solid var(--line-strong);color:var(--ink-soft)}
.wrap{max-width:1180px;margin:0 auto;padding:22px 22px 80px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow)}
.kpi .lab{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:650}
.kpi .val{font-size:22px;font-weight:750;margin-top:6px;letter-spacing:-.02em}
.kpi .val.small{font-size:18px}
.kpi .sub{font-size:12px;color:var(--ink-soft);margin-top:3px}
.kpi.accent{background:linear-gradient(135deg,var(--violet),var(--navy));border:none;color:#fff}
.kpi.accent .lab,.kpi.accent .sub{color:rgba(255,255,255,.82)}
.viewnav{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.viewnav button{background:var(--panel);border:1px solid var(--line-strong);border-radius:11px;padding:10px 16px;font-weight:650;font-size:14px;color:var(--ink-soft);font-family:inherit;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.viewnav button:hover{border-color:var(--violet);color:var(--violet)}
.viewnav button.active{background:var(--violet);border-color:var(--violet);color:#fff;box-shadow:0 8px 18px -8px rgba(109,59,245,.55)}
#despWrap,#fluxoWrap{display:none}
body.view-despesas #alertWrap,body.view-despesas #membrosWrap,body.view-despesas #atribWrap,body.view-despesas .kpis,body.view-despesas .toolbar,body.view-despesas #list,
body.view-fluxo #alertWrap,body.view-fluxo #membrosWrap,body.view-fluxo #atribWrap,body.view-fluxo .kpis,body.view-fluxo .toolbar,body.view-fluxo #list{display:none}
body.view-despesas #despWrap{display:block}
body.view-fluxo #fluxoWrap{display:block}
.viewnav .nav-acao{border-style:dashed;color:var(--violet);border-color:color-mix(in srgb,var(--violet) 40%,transparent)}
.viewnav .nav-acao:hover{background:var(--violet-tint)}
.val-pos{color:var(--ok)}
.val-neg{color:var(--crit)}
.fx-chart{display:flex;gap:8px;align-items:flex-end;height:200px;padding:12px 4px;border-bottom:1px solid var(--line);overflow-x:auto}
.fx-col{flex:1;min-width:46px;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%}
.fx-bars{flex:1;display:flex;gap:3px;align-items:flex-end;width:100%;justify-content:center}
.fx-bars i{width:14px;border-radius:4px 4px 0 0;display:block;min-height:2px;transition:height .35s ease}
.fx-rec{background:var(--ok)}
.fx-des{background:var(--crit)}
.fx-lbl{font-size:10.5px;color:var(--ink-soft);font-weight:700;white-space:nowrap}
.fx-legend{display:flex;gap:18px;font-size:12px;color:var(--ink-soft);margin-top:12px;flex-wrap:wrap}
.fx-k{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:middle;margin-right:5px}
.kpi.goview{cursor:pointer}
.kpi.goview:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(109,59,245,.16);border-color:color-mix(in srgb,var(--violet) 45%,var(--line))}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.toolbar .search{position:relative;flex:1;min-width:180px}
.toolbar .search input{padding-left:34px}
.toolbar .search .mag{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-soft)}
.seg{display:flex;border:1px solid var(--line-strong);border-radius:10px;overflow:hidden}
.seg button{background:var(--panel);border:none;padding:9px 13px;font-size:13px;color:var(--ink-soft);font-weight:600}
.seg button.active{background:var(--violet-tint);color:var(--violet)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.card-head{display:flex;gap:15px;align-items:center;padding:16px 18px;cursor:pointer}
.card-head:hover{background:var(--panel-2)}
.c-title{flex:1;min-width:0}
.c-title h3{font-size:16.5px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.c-title .meta{font-size:12.5px;color:var(--ink-soft);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap}
.chip.ativo{background:var(--ok-tint);color:var(--ok)}
.chip.andamento{background:var(--info-tint);color:var(--info)}
.chip.pausado{background:var(--warn-tint);color:var(--warn)}
.chip.encerrado{background:var(--line);color:var(--ink-soft)}
.chip.atrasado{background:var(--crit-tint);color:var(--crit)}
.chip.negociacao{background:var(--violet-tint);color:var(--violet)}
.prog-wrap{width:140px;flex-shrink:0}
.prog-num{font-size:12px;color:var(--ink-soft);margin-bottom:5px;display:flex;justify-content:space-between}
.bar{height:8px;background:var(--line);border-radius:6px;overflow:hidden}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--violet-soft),var(--violet));border-radius:6px;transition:.3s}
.caret{color:var(--ink-soft);transition:.2s;font-size:13px;flex-shrink:0}
.card.open .caret{transform:rotate(90deg)}
.money-head{text-align:right;flex-shrink:0;min-width:118px}
.money-head .big{font-weight:750;font-size:16px}
.money-head .lil{font-size:11.5px;color:var(--ink-soft)}
.card-body{display:none;border-top:1px solid var(--line);padding:4px 18px 20px}
.card.open .card-body{display:block}
.sec{margin-top:18px}
.sec > .h{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px;justify-content:space-between}
.grid-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.mi{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.mi .k{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em}
.mi .v{font-weight:650;margin-top:3px;font-size:14px}
.scope{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--ink);white-space:pre-wrap}
.anexos{display:flex;flex-direction:column;gap:8px}
.anexo{display:flex;align-items:center;gap:8px;background:var(--panel-2);border:1px solid var(--line-strong);border-radius:10px;padding:11px 13px;text-decoration:none;color:var(--ink);font-weight:600;font-size:13.5px;transition:.15s}
.anexo:hover{border-color:var(--violet);color:var(--violet);background:var(--violet-tint)}
.anexo span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.desp-tbl td{padding:6px 8px;vertical-align:middle}
.desp-tbl .cell{padding:8px 9px;font-size:13.5px;background:var(--panel-2);border:1px solid var(--line-strong);border-radius:8px;width:100%}
.desp-tbl .cell.rr{text-align:right}
.desp-tbl th{white-space:nowrap}
.desp-tbl td:nth-child(3){min-width:120px}
.prog-ctl{display:flex;align-items:center;gap:12px;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:12px;flex-wrap:wrap}
.prog-ctl .toggle{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;white-space:nowrap}
.prog-ctl input[type=range]{flex:1;min-width:120px;accent-color:var(--violet)}
.prog-ctl .pct{font-weight:750;min-width:44px;text-align:right}
.switch{position:relative;width:40px;height:22px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0;position:absolute}
.switch .sl{position:absolute;inset:0;background:var(--line-strong);border-radius:999px;transition:.2s}
.switch .sl:before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.switch input:checked + .sl{background:var(--violet)}
.switch input:checked + .sl:before{transform:translateX(18px)}
.stage{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:var(--panel-2);flex-wrap:wrap}
.stage .name{flex:1;min-width:160px;font-size:14px}
.resp-wrap{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.resp-add{min-width:140px;color:var(--violet)}
.resp-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:650;padding:4px 6px 4px 10px;border-radius:999px;background:var(--violet-tint);color:var(--violet);white-space:nowrap}
.resp-chip.vazio{background:var(--line);color:var(--ink-soft);font-weight:500;padding:4px 10px}
.resp-chip .rx{border:none;background:color-mix(in srgb,var(--violet) 22%,transparent);color:var(--violet);width:16px;height:16px;border-radius:50%;font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0}
.resp-chip .rx:hover{background:var(--crit);color:#fff}
.apelido{font-weight:600;color:var(--violet);font-size:13px}
.atrib-filter{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.atrib-filter label{font-size:13px;font-weight:650;color:var(--ink-soft)}
.atrib-filter select{width:auto;min-width:180px}
.atrib-block{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;background:var(--panel-2)}
.atrib-head{display:flex;align-items:center;gap:9px;margin-bottom:6px;font-size:14.5px}
.atrib-head .avatar{width:30px;height:30px;font-size:12px}
.atrib-head b{font-weight:700}
.atrib-count{margin-left:auto;font-size:12px;font-weight:700;background:var(--violet-tint);color:var(--violet);padding:2px 10px;border-radius:999px}
.atrib-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px solid var(--line);font-size:13.5px}
.atrib-etapa{flex:1;min-width:0}
.atrib-status{font-size:12px;color:var(--ink-soft);white-space:nowrap;font-weight:600}
.atrib-empty{font-size:13px;color:var(--ink-soft);padding-top:6px}
.carga{display:flex;align-items:center;gap:10px;margin:2px 0 9px}
.carga-bar{flex:1;height:6px;background:var(--line);border-radius:6px;overflow:hidden;max-width:170px}
.carga-bar i{display:block;height:100%;border-radius:6px;transition:.3s}
.carga-lbl{font-size:11.5px;font-weight:650;color:var(--ink-soft);white-space:nowrap}

/* ---------- derived ---------- */
const isDone=st=>st==="concluida"||st==="entregue";
const STAGE_WEIGHT={pendente:0,andamento:0.5,concluida:1,entregue:1}; // "Em andamento" conta meio caminho
function autoProgress(c){const es=c.etapas||[];if(!es.length)return 0;const soma=es.reduce((a,e)=>a+(STAGE_WEIGHT[e.status]||0),0);return Math.round(soma/es.length*100);}
function progress(c){ if(c.autoProgresso===false && c.progressoManual!=null && c.progressoManual!=="") return Math.max(0,Math.min(100,+c.progressoManual)); return autoProgress(c); }
const getFin=c=>c.fin||{valorTotal:0,valorMensal:0,parcelas:[],despesas:[]};
function recebido(c){return getFin(c).parcelas.filter(p=>p.pago).reduce((s,p)=>s+(+p.valor||0),0);}
function aReceber(c){return getFin(c).parcelas.filter(p=>!p.pago).reduce((s,p)=>s+(+p.valor||0),0);}
function despesaTotal(c){return getFin(c).despesas.reduce((s,d)=>s+(+d.valor||0),0);}
function temVencido(c){const t=todayISO();return getFin(c).parcelas.some(p=>!p.pago&&p.venc&&p.venc<t);}
function statusEfetivo(c){
  if(c.status==="encerrado")return "encerrado";
  if(c.status==="negociacao")return "negociacao";
  if(c.status==="pausado")return "pausado";
  if(ROLE==="gestao"&&temVencido(c))return "atrasado";
  const p=progress(c); if(p>0&&p<100)return "andamento";
  return c.status||"ativo";
}
function diasAte(iso){ if(!iso)return null; const d=parseISO(iso); if(!d||isNaN(d))return null; return Math.round((d-parseISO(todayISO()))/86400000); }
function etapaAtrasada(e){ return e && e.prazo && !isDone(e.status) && e.prazo < todayISO(); }
function buildAlertas(){
  const list=[];
  DB.forEach(c=>{
    if(statusEfetivo(c)==="encerrado")return;
    if(c.dataFim){ const dd=diasAte(c.dataFim);
      if(dd!=null && dd<0) list.push({sev:"crit",tipo:"Contrato vencido",cid:c.id,txt:`${c.cliente} · venceu ${brDate(c.dataFim)} (${-dd}d atrás)`});
      else if(dd!=null && dd<=15) list.push({sev:"warn",tipo:"Contrato vencendo",cid:c.id,txt:`${c.cliente} · vence ${brDate(c.dataFim)} (faltam ${dd}d)`}); }
    (c.etapas||[]).forEach(e=>{ if(!e.prazo||isDone(e.status))return; const dd=diasAte(e.prazo);
      if(dd!=null && dd<0) list.push({sev:"crit",tipo:"Etapa atrasada",cid:c.id,txt:`${c.cliente} · ${e.nome} (${-dd}d atrasada)`});
      else if(dd!=null && dd<=5) list.push({sev:"warn",tipo:"Etapa perto do prazo",cid:c.id,txt:`${c.cliente} · ${e.nome} (faltam ${dd}d)`}); });
    if(ROLE==="gestao"){ getFin(c).parcelas.forEach(p=>{ if(p.pago||!p.venc)return; const dd=diasAte(p.venc);
      if(dd!=null && dd<0) list.push({sev:"crit",tipo:"Parcela vencida",cid:c.id,txt:`${c.cliente} · ${p.label||"parcela"} ${fmt(p.valor)} venceu ${brDate(p.venc)}`});
      else if(dd!=null && dd<=7) list.push({sev:"warn",tipo:"Parcela a vencer",cid:c.id,txt:`${c.cliente} · ${p.label||"parcela"} ${fmt(p.valor)} vence ${brDate(p.venc)}`}); }); }
  });
  return list.sort((a,b)=> a.sev===b.sev?0:(a.sev==="crit"?-1:1));
}

function renderFluxo(){
  const wrap=$("#fluxoWrap"); if(!wrap)return;
  if(ROLE!=="gestao"){wrap.innerHTML="";return;}
  const MESES=12, hoje=new Date(), base=new Date(hoje.getFullYear(),hoje.getMonth(),1);
  const desp=despesaFixaMes();
  const rows=[]; let acum=0;
  for(let k=0;k<MESES;k++){
    const d=new Date(base.getFullYear(),base.getMonth()+k,1);
    const ym=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    let receita=0;
    DB.forEach(c=>{ if(statusEfetivo(c)==="negociacao")return; getFin(c).parcelas.forEach(p=>{ if(p.venc&&p.venc.slice(0,7)===ym)receita+=(+p.valor||0); }); });
    const saldo=receita-desp; acum+=saldo;
    rows.push({label:d.toLocaleDateString("pt-BR",{month:"short",year:"2-digit"}),receita,saldo,acum});
  }
  const maxV=Math.max(1,...rows.map(r=>Math.max(r.receita,desp)));
  const bars=rows.map(r=>`<div class="fx-col" title="${r.label} · receita ${fmt(r.receita)} · despesa ${fmt(desp)}"><div class="fx-bars"><i class="fx-rec" style="height:${(r.receita/maxV*100).toFixed(1)}%"></i><i class="fx-des" style="height:${(desp/maxV*100).toFixed(1)}%"></i></div><span class="fx-lbl">${r.label}</span></div>`).join("");
  const tbody=rows.map(r=>`<tr><td>${r.label}</td><td class="r mono">${fmt(r.receita)}</td><td class="r mono">${fmt(desp)}</td><td class="r mono ${r.saldo<0?"val-neg":"val-pos"}">${fmt(r.saldo)}</td><td class="r mono ${r.acum<0?"val-neg":"val-pos"}">${fmt(r.acum)}</td></tr>`).join("");
  const totRec=rows.reduce((s,r)=>s+r.receita,0), totDes=desp*MESES, res=totRec-totDes;
  wrap.innerHTML=`<div class="card" style="margin-bottom:22px"><div class="card-head" style="cursor:default">
      <div class="c-title"><h3>Fluxo de caixa projetado</h3><div class="meta">Próximos ${MESES} meses · receita prevista (parcelas dos contratos ativos) x despesas fixas mensais</div></div>
      <div class="money-head"><div class="big mono ${res<0?"val-neg":"val-pos"}">${fmt(res)}</div><div class="lil">resultado do período</div></div></div>
    <div class="card-body" style="display:block">
      <div class="fx-chart">${bars}</div>
      <div class="fx-legend"><span><i class="fx-k fx-rec"></i> receita prevista</span><span><i class="fx-k fx-des"></i> despesa fixa (${fmt(desp)}/mês)</span></div>
      <div style="overflow-x:auto;margin-top:18px"><table class="tbl"><thead><tr><th>Mês</th><th class="r">Receita prevista</th><th class="r">Despesa fixa</th><th class="r">Saldo</th><th class="r">Acumulado</th></tr></thead><tbody>${tbody}</tbody></table></div>
    </div></div>`;
}

function wireDespPanel(){
  const wrap=$("#despWrap");

function renderKpis(){
  const box=$("#kpis");const ativos=DB.filter(c=>{const s=statusEfetivo(c);return s!=="encerrado"&&s!=="negociacao";});
  const etTot=DB.reduce((s,c)=>s+(c.etapas?.length||0),0);
  const etDone=DB.reduce((s,c)=>s+(c.etapas?.filter(e=>isDone(e.status)).length||0),0);
  const kpi=(lab,val,sub,cls="",small=false,filter=null)=>`<div class="kpi ${cls}${filter?" kpi-click":""}${filter&&FILTER===filter?" active":""}" ${filter?`data-kpifilter="${filter}"`:""}><div class="lab">${lab}</div><div class="val ${small?'small':''}">${val}</div>${sub?`<div class="sub">${sub}</div>`:""}</div>`;
  const emNeg=DB.filter(c=>statusEfetivo(c)==="negociacao").length;
  let h="";
  h+=kpi("Contratos ativos",ativos.length,`${DB.length} no total`,"",false,"ativo");
  h+=kpi("Em negociação",emNeg,"no funil de fechamento","",false,"negociacao");
  h+=kpi("Etapas concluídas",`${etDone}<span style="font-size:14px;color:var(--ink-soft)">/${etTot}</span>`,"entregas marcadas");
  if(ROLE==="gestao"){
    const totC=DB.reduce((s,c)=>s+getFin(c).valorTotal,0);
    const totMes=ativos.reduce((s,c)=>s+getFin(c).valorMensal,0);
    const totR=DB.reduce((s,c)=>s+recebido(c),0);
    const totAR=DB.reduce((s,c)=>s+aReceber(c),0);
    const despFixMes=despesaFixaMes();
    h+=kpi("Total contratado",fmt(totC),"soma dos contratos","accent",true);
    h+=kpi("A receber / mês",fmt(totMes),"recorrente (ativos)","",true);
    h+=kpi("Despesas fixas / mês",fmt(despFixMes),"custos mensais · abrir aba","goview",true);
    h+=kpi("Resultado / mês",fmt(totMes-despFixMes),"receita − despesas","",true);
    h+=kpi("Recebido",fmt(totR),"parcelas pagas","",true);
    h+=kpi("A receber",fmt(totAR),"parcelas em aberto","",true);
  }
  box.innerHTML=h;
  box.querySelectorAll("[data-kpifilter]").forEach(k=>k.onclick=()=>setFilter(k.dataset.kpifilter));
  box.querySelectorAll(".goview").forEach(k=>k.onclick=()=>switchView("despesas"));
}
function setFilter(f){
  FILTER=(FILTER===f && f!=="todos")?"todos":f;   // clicar de novo no mesmo card volta pra Todos
  const seg=$("#filterSeg"); if(seg)seg.querySelectorAll("button").forEach(x=>x.classList.toggle("active",x.dataset.f===FILTER));
  renderKpis(); renderList();
  const l=$("#list"); if(l && !matchMedia("(prefers-reduced-motion:reduce)").matches) l.scrollIntoView({behavior:"smooth",block:"start"});

function switchView(v){

function renderList(){
  const list=$("#list");let rows=DB.slice().sort((a,b)=>(b.dataInicio||"").localeCompare(a.dataInicio||""));
  if(QUERY){const q=QUERY.toLowerCase();rows=rows.filter(c=>(c.cliente+" "+(c.razao||"")+" "+(c.escopo||"")).toLowerCase().includes(q));}
  if(FILTER!=="todos")rows=rows.filter(c=>{const s=statusEfetivo(c);if(FILTER==="ativo")return s!=="encerrado"&&s!=="negociacao";if(FILTER==="negociacao")return s==="negociacao";if(FILTER==="encerrado")return s==="encerrado";if(FILTER==="atrasado")return s==="atrasado"||s==="pausado";return true;});
  list.innerHTML="";
  if(!rows.length){list.innerHTML=`<div class="empty">Nenhum contrato encontrado.</div>`;return;}

function cardEl(c){
  const el=document.createElement("div");el.className="card";el.dataset.id=c.id;
  const s=statusEfetivo(c),p=progress(c);
  const chip=s==="encerrado"?"encerrado":s==="atrasado"?"atrasado":s==="negociacao"?"negociacao":s==="pausado"?"pausado":s==="andamento"?"andamento":"ativo";
  const doneN=(c.etapas||[]).filter(e=>isDone(e.status)).length,totN=(c.etapas||[]).length;
  const money=ROLE==="gestao"?`<div class="money-head hide-team"><div class="big mono">${fmt(getFin(c).valorTotal)}</div><div class="lil">${getFin(c).valorMensal?fmt(getFin(c).valorMensal)+"/mês":"recebido "+fmt(recebido(c))}</div></div>`:"";
  el.innerHTML=`<div class="card-head">
      <div class="c-title"><h3>${esc(c.cliente)} <span class="chip ${chip}">${STATUS_LABEL[s]||s}</span></h3>
        <div class="meta">${c.cnpj?("CNPJ "+esc(c.cnpj)+" · "):""}Início ${brDate(c.dataInicio)} · Término ${brDate(c.dataFim)}</div></div>
      <div class="prog-wrap"><div class="prog-num"><span>Progresso</span><span>${p}%${totN?` · ${doneN}/${totN}`:""}</span></div><div class="bar"><i style="width:${p}%"></i></div></div>
      ${money}<span class="caret">▶</span></div>
    <div class="card-body">${bodyHtml(c)}</div>`;
  el.querySelector(".card-head").onclick=()=>el.classList.toggle("open");
  wireBody(el,c);return el;
}
function cronoHtml(c){
  const ini=c.dataInicio, fim=c.dataFim;
  const comPrazo=(c.etapas||[]).filter(e=>e.prazo);
  if(!ini||!fim||!comPrazo.length)return "";
  const t0=parseISO(ini).getTime(), t1=parseISO(fim).getTime(), span=Math.max(1,t1-t0);
  const pct=iso=>{const p=parseISO(iso); if(!p||isNaN(p))return null; return Math.max(0,Math.min(100,((p.getTime()-t0)/span)*100));};
  const hoje=pct(todayISO());
  const marks=comPrazo.map(e=>{const x=pct(e.prazo); if(x==null)return ""; const st=isDone(e.status)?"entregue":(etapaAtrasada(e)?"atrasada":"pend"); return `<span class="cron-mk cron-${st}" style="left:${x}%" title="${esc(e.nome)} · ${brDate(e.prazo)}"></span>`;}).join("");
  return `<div class="sec"><div class="h"><span>Cronograma</span><span style="color:var(--ink-soft);font-weight:400;text-transform:none;letter-spacing:0">${brDate(ini)} → ${brDate(fim)}</span></div>
    <div class="crono"><div class="crono-track">${hoje!=null?`<span class="crono-hoje" style="left:${hoje}%" title="hoje"></span>`:""}${marks}</div>
    <div class="crono-legend"><span><i class="cron-mk cron-entregue"></i> entregue</span><span><i class="cron-mk cron-pend"></i> pendente</span><span><i class="cron-mk cron-atrasada"></i> atrasada</span><span><i class="crono-hoje-i"></i> hoje</span></div></div></div>`;
}

    <div class="sec hide-team"><div class="h"><span>Despesas do contrato</span><span class="mono" style="color:var(--ink-soft)">Total ${fmt(despesaTotal(c))}</span></div>
      <table class="tbl"><thead><tr><th>Descrição</th><th>Data</th><th class="r">Valor</th><th class="r"></th></tr></thead>
      <tbody>${getFin(c).despesas.map((d,i)=>despRow(c,d,i)).join("")||'<tr><td colspan="4" style="color:var(--ink-soft)">Nenhuma despesa lançada.</td></tr>'}</tbody></table>

  return meta+escopo+etapas+cronoHtml(c)+fin+docs+obs+actions;
}
function respList(e){ return Array.isArray(e.resps)?e.resps:(e.resp?[e.resp]:[]); }
function stageRow(c,e,i){
  const done=isDone(e.status);
  const resps=respList(e);
  let respHtml;
  if(ROLE==="gestao"){
    const chips=resps.map(r=>`<span class="resp-chip">${esc(r)}<button class="rx" data-respdel="${c.id}:${i}:${esc(r)}" title="remover">×</button></span>`).join("");
    const opts=MEMBROS.filter(m=>!resps.includes(m.nome)).map(m=>`<option value="${esc(m.nome)}">${esc(m.nome)}</option>`).join("");
    respHtml=`<span class="resp-wrap">${chips}<select class="st-select resp-add" data-respadd="${c.id}:${i}"><option value="">+ responsável</option>${opts}</select></span>`;
  } else {
    respHtml=resps.length?`<span class="resp-wrap">${resps.map(r=>`<span class="resp-chip">👤 ${esc(r)}</span>`).join("")}</span>`:`<span class="resp-chip vazio">sem responsável</span>`;
  }
  let prazoHtml="";
  if(e.prazo){ const dd=diasAte(e.prazo); const cls=done?"praz-done":(dd<0?"praz-late":(dd<=5?"praz-soon":"praz-ok")); const txt=done?brDate(e.prazo):(dd<0?`atrasada ${-dd}d`:(dd===0?"vence hoje":`faltam ${dd}d`)); prazoHtml=`<span class="praz ${cls}" title="Prazo: ${brDate(e.prazo)}">📅 ${txt}</span>`; }
  const nc=(e.coments||[]).length;
  const cmtHtml=`<button class="cmt-btn ${nc?"tem":""}" data-cmt="${c.id}:${i}" title="Comentários da etapa">💬 ${nc}</button>`;
  return `<div class="stage ${done?'done':''}"><span class="st-dot dot-${e.status}"></span><span class="name">${esc(e.nome)}</span>${prazoHtml}${respHtml}${cmtHtml}<select class="st-select" data-stage="${c.id}:${i}">${STAGE_STATES.map(s=>`<option value="${s.v}" ${s.v===e.status?"selected":""}>${s.t}</option>`).join("")}</select></div>`;
}
function parcelaRow(c,p,i){const t=todayISO(),venc=!p.pago&&p.venc&&p.venc<t;const tag=p.pago?`<span class="pay-tag pago">Pago</span>`:venc?`<span class="pay-tag venc">Vencido</span>`:`<span class="pay-tag aberto">Em aberto</span>`;
  return `<tr><td>${esc(p.label||("Parcela "+(i+1)))}</td><td>${brDate(p.venc)}</td><td class="r mono">${fmt(p.valor)}</td><td class="r">${tag} <button class="link" data-pay="${c.id}:${i}">${p.pago?"desmarcar":"marcar pago"}</button>${!p.pago?` · <button class="link" data-cob="${c.id}:${i}">cobrar</button>`:""}</td></tr>`;}
function despRow(c,d,i){return `<tr><td>${esc(d.desc||"—")}</td><td>${brDate(d.data)}</td><td class="r mono">${fmt(d.valor)}</td><td class="r"><button class="link" style="color:var(--crit)" data-deldesp="${c.id}:${i}">remover</button></td></tr>`;}

function wireBody(el,c){
  el.querySelectorAll("[data-stage]").forEach(sel=>sel.onchange=async ev=>{ev.stopPropagation();
    const [id,i]=sel.dataset.stage.split(":");const ct=DB.find(x=>x.id===id);ct.etapas[+i].status=sel.value;
    try{await Store.patchContract(ct);softRefresh(id);renderKpis();}catch(e){toast("Erro ao salvar etapa",true);}});
  el.querySelectorAll("[data-cmt]").forEach(b=>b.onclick=ev=>{ev.stopPropagation();const[id,i]=b.dataset.cmt.split(":");comentariosModal(id,+i);});
  el.querySelectorAll("[data-cob]").forEach(b=>b.onclick=ev=>{ev.stopPropagation();const[id,i]=b.dataset.cob.split(":");cobrancaModal(id,+i);});
  el.querySelectorAll("[data-respadd]").forEach(sel=>sel.onchange=async ev=>{ev.stopPropagation();
    const v=sel.value; if(!v)return;
    const [id,i]=sel.dataset.respadd.split(":");const ct=DB.find(x=>x.id===id);const e=ct.etapas[+i];
    const arr=respList(e); if(!arr.includes(v))arr.push(v); e.resps=arr; delete e.resp;
    try{await Store.patchContract(ct);softRefresh(id);}catch(err){toast("Erro ao salvar responsável",true);}});
  el.querySelectorAll("[data-respdel]").forEach(b=>b.onclick=async ev=>{ev.stopPropagation();
    const parts=b.dataset.respdel.split(":");const id=parts[0],i=parts[1],nome=parts.slice(2).join(":");
    const ct=DB.find(x=>x.id===id);const e=ct.etapas[+i];
    e.resps=respList(e).filter(r=>r!==nome); delete e.resp;
    try{await Store.patchContract(ct);softRefresh(id);}catch(err){toast("Erro ao remover responsável",true);}});
  el.querySelectorAll("[data-auto]").forEach(chk=>chk.onchange=async ev=>{ev.stopPropagation();
    const ct=DB.find(x=>x.id===chk.dataset.auto);ct.autoProgresso=chk.checked;if(chk.checked)ct.progressoManual=null;else if(ct.progressoManual==null)ct.progressoManual=progress(ct);
    try{await Store.patchContract(ct);softRefresh(ct.id);renderKpis();}catch(e){toast("Erro ao salvar",true);}});
  el.querySelectorAll("[data-range]").forEach(rg=>{
    rg.oninput=ev=>{ev.stopPropagation();const pct=rg.parentElement.querySelector(".pct");if(pct)pct.textContent=rg.value+"%";const bar=el.querySelector(".bar > i");if(bar)bar.style.width=rg.value+"%";};
    rg.onchange=async ev=>{ev.stopPropagation();const ct=DB.find(x=>x.id===rg.dataset.range);ct.autoProgresso=false;ct.progressoManual=+rg.value;
      try{await Store.patchContract(ct);softRefresh(ct.id);renderKpis();}catch(e){toast("Erro ao salvar progresso",true);}};
  });
  el.querySelectorAll("[data-pay]").forEach(b=>b.onclick=async ev=>{ev.stopPropagation();const[id,i]=b.dataset.pay.split(":");const ct=DB.find(x=>x.id===id);
    ct.fin.parcelas[+i].pago=!ct.fin.parcelas[+i].pago;try{await Store.saveFin(ct);softRefresh(id);renderKpis();}catch(e){toast("Erro ao salvar pagamento",true);}});
  el.querySelectorAll("[data-deldesp]").forEach(b=>b.onclick=async ev=>{ev.stopPropagation();const[id,i]=b.dataset.deldesp.split(":");const ct=DB.find(x=>x.id===id);
    ct.fin.despesas.splice(+i,1);try{await Store.saveFin(ct);softRefresh(id);renderKpis();}catch(e){toast("Erro ao remover",true);}});
  const addD=el.querySelector("[data-add-desp]");if(addD)addD.onclick=ev=>{ev.stopPropagation();despesaModal(c.id);};
  const ed=el.querySelector("[data-edit]");if(ed)ed.onclick=ev=>{ev.stopPropagation();contractModal(c.id);};
  const dp=el.querySelector("[data-dup]");if(dp)dp.onclick=async ev=>{ev.stopPropagation();const copy=JSON.parse(JSON.stringify(c));copy.id=uid();copy.cliente=c.cliente+" (cópia)";
    try{await Store.saveContract(copy,{withFin:true});render();toast("Contrato duplicado");}catch(e){toast("Erro ao duplicar",true);}};
  const dl=el.querySelector("[data-del]");if(dl)dl.onclick=async ev=>{ev.stopPropagation();if(confirm('Excluir o contrato "'+c.cliente+'"? Esta ação não pode ser desfeita.')){
    try{await Store.remove(c.id);render();toast("Contrato excluído");}catch(e){toast("Erro ao excluir",true);}}};
}
function softRefresh(id){const c=DB.find(x=>x.id===id);if(!c)return;const old=document.querySelector(`.card[data-id="${id}"]`);if(!old)return;const wasOpen=old.classList.contains("open");const neu=cardEl(c);if(wasOpen)neu.classList.add("open");old.replaceWith(neu);}

    stagesWrap.querySelectorAll("[data-sn]").forEach(el=>el.oninput=()=>c.etapas[+el.dataset.sn].nome=el.value);
    stagesWrap.querySelectorAll("[data-ss]").forEach(el=>el.onchange=()=>c.etapas[+el.dataset.ss].status=el.value);
    stagesWrap.querySelectorAll("[data-sp]").forEach(el=>el.onchange=()=>c.etapas[+el.dataset.sp].prazo=el.value);
    stagesWrap.querySelectorAll("[data-rs]").forEach(el=>el.onclick=()=>{c.etapas.splice(+el.dataset.rs,1);drawStages();});
    parcWrap.querySelectorAll("[data-pn]").forEach(el=>el.oninput=()=>c.fin.parcelas[+el.dataset.pn].label=el.value);
    parcWrap.querySelectorAll("[data-pv]").forEach(el=>el.oninput=()=>c.fin.parcelas[+el.dataset.pv].valor=+el.value);
    parcWrap.querySelectorAll("[data-pd]").forEach(el=>el.onchange=()=>c.fin.parcelas[+el.dataset.pd].venc=el.value);
    parcWrap.querySelectorAll("[data-rp]").forEach(el=>el.onclick=()=>{c.fin.parcelas.splice(+el.dataset.rp,1);drawParc();});
    anexWrap.querySelectorAll("[data-an]").forEach(el=>el.oninput=()=>c.anexos[+el.dataset.an].nome=el.value);
    anexWrap.querySelectorAll("[data-au]").forEach(el=>el.oninput=()=>c.anexos[+el.dataset.au].url=el.value);
    anexWrap.querySelectorAll("[data-ra]").forEach(el=>el.onclick=()=>{c.anexos.splice(+el.dataset.ra,1);drawAnex();});
  }
  drawStages();drawParc();drawAnex();
  m.querySelector("#addStage").onclick=()=>{c.etapas.push({nome:"",status:"pendente"});drawStages();};
  m.querySelector("#addParc").onclick=()=>{c.fin.parcelas.push({label:(c.fin.parcelas.length+1)+"ª parcela",valor:"",venc:"",pago:false});drawParc();};
  m.querySelector("#addAnex").onclick=()=>{c.anexos.push({nome:"",url:""});drawAnex();};
  m.querySelector("#genParc").onclick=()=>{const total=+m.querySelector("#f-valor").value||0;const n=parseInt(prompt("Quantas parcelas?","4"),10);if(!n||n<1)return;const ini=m.querySelector("#f-ini").value||m.querySelector("#f-ass").value||todayISO();const each=Math.round(total/n*100)/100;c.fin.parcelas=Array.from({length:n},(_,i)=>({label:(i+1)+"ª parcela",valor:each,venc:addMonths(ini,i),pago:false}));drawParc();};
  m.querySelectorAll("[data-x]").forEach(b=>b.onclick=()=>m.remove());
  m.onclick=e=>{if(e.target===m)m.remove();};
  m.querySelector("#saveC").onclick=async()=>{
    c.cliente=m.querySelector("#f-cliente").value.trim()||"(sem nome)";
    c.razao=m.querySelector("#f-razao").value.trim();c.cnpj=m.querySelector("#f-cnpj").value.trim();c.rep=m.querySelector("#f-rep").value.trim();
    c.telefone=m.querySelector("#f-tel").value.trim();
    c.status=m.querySelector("#f-status").value;
    c.dataInicio=m.querySelector("#f-ini").value;c.dataFim=m.querySelector("#f-fim").value;c.dataAssinatura=m.querySelector("#f-ass").value;
    c.prazoValor=m.querySelector("#f-prazoV").value;c.prazoTipo=m.querySelector("#f-prazoT").value;
    c.escopo=m.querySelector("#f-escopo").value.trim();c.obs=m.querySelector("#f-obs").value.trim();
    c.anexos=(c.anexos||[]).filter(a=>a&&a.url&&a.url.trim());
    c.fin.valorTotal=+m.querySelector("#f-valor").value||0;c.fin.valorMensal=+m.querySelector("#f-mensal").value||0;
    if(!c.dataFim&&c.dataInicio&&c.prazoValor)c.dataFim=c.prazoTipo==="dias"?addDays(c.dataInicio,+c.prazoValor):addMonths(c.dataInicio,+c.prazoValor);
    const btn=m.querySelector("#saveC");btn.disabled=true;btn.innerHTML='<span class="spin"></span> Salvando';
    try{await Store.saveContract(c,{withFin:true});m.remove();render();toast(editing?"Contrato atualizado":"Contrato criado");}
    catch(e){btn.disabled=false;btn.textContent="Salvar";toast("Erro ao salvar: "+(e.message||""),true);}
  };
}
function textoModal(titulo,sub,texto,extraBtn){
  const bg=document.createElement("div"); bg.className="modal-bg";
  bg.innerHTML=`<div class="modal" style="max-width:620px"><div class="modal-head"><h2>${esc(titulo)}</h2><button class="close-x" data-x>×</button></div>
    <div class="modal-body">
      ${sub?`<div class="scope" style="margin-bottom:12px">${sub}</div>`:""}
      <textarea id="txOut" rows="16" style="font-size:13.5px;line-height:1.55">${esc(texto)}</textarea>
      <div id="txMsg" style="font-size:12.5px;color:var(--ok);font-weight:650;margin-top:8px;min-height:16px"></div>
    </div>
    <div class="modal-foot">${extraBtn||""}<button class="btn ghost" data-x>Fechar</button><button class="btn" id="txCopy">Copiar texto</button></div></div>`;
  $("#modalMount").appendChild(bg);
  bg.querySelectorAll("[data-x]").forEach(b=>b.onclick=()=>bg.remove());
  bg.onclick=e=>{if(e.target===bg)bg.remove();};
  bg.querySelector("#txCopy").onclick=async()=>{
    const ta=bg.querySelector("#txOut");
    try{ await navigator.clipboard.writeText(ta.value); }catch(e){ ta.select(); try{document.execCommand("copy");}catch(_){ } }
    bg.querySelector("#txMsg").textContent="Copiado. É só colar.";
  };
  return bg;
}
function resumoModal(){
  const hoje=new Date();
  const ativos=DB.filter(c=>{const s=statusEfetivo(c);return s!=="encerrado"&&s!=="negociacao";});
  const emNeg=DB.filter(c=>statusEfetivo(c)==="negociacao").length;
  const etTot=DB.reduce((s,c)=>s+(c.etapas?.length||0),0);
  const etDone=DB.reduce((s,c)=>s+(c.etapas?.filter(e=>isDone(e.status)).length||0),0);
  const atrasadas=[],prox=[];
  DB.forEach(c=>{ if(statusEfetivo(c)==="encerrado")return;
    (c.etapas||[]).forEach(e=>{ if(!e.prazo||isDone(e.status))return; const dd=diasAte(e.prazo); const resp=respList(e).join(", ")||"sem responsável";
      if(dd<0)atrasadas.push(`- ${c.cliente}: ${e.nome} (${-dd} dias em atraso, com ${resp})`);
      else if(dd<=7)prox.push(`- ${c.cliente}: ${e.nome} (vence ${brDate(e.prazo)}, com ${resp})`); }); });
  let t=`Resumo da semana, ${hoje.toLocaleDateString("pt-BR")}\n\n`;
  t+=`Contratos ativos: ${ativos.length}\n`;
  if(emNeg)t+=`Em negociação: ${emNeg}\n`;
  t+=`Entregas concluídas: ${etDone} de ${etTot}\n\n`;
  t+= atrasadas.length ? `ATRASADAS (${atrasadas.length}):\n${atrasadas.join("\n")}\n\n` : `Nenhuma etapa atrasada. Time no prazo.\n\n`;
  t+= prox.length ? `VENCE NOS PRÓXIMOS 7 DIAS (${prox.length}):\n${prox.join("\n")}\n\n` : `Nada vencendo nos próximos 7 dias.\n\n`;
  t+=`Painel: https://riksonmiguellz.github.io/controle-contratos/`;
  textoModal("Resumo da semana","Texto pronto para colar no grupo. Só operacional, sem valores.",t);
}
function cobrancaModal(cid,pi){
  const c=DB.find(x=>x.id===cid); if(!c)return;
  const p=getFin(c).parcelas[pi]; if(!p)return;
  const dd=diasAte(p.venc), nome=c.rep||c.cliente, parc=p.label||"parcela";
  let msg;
  if(dd>=0){
    msg=`Olá, ${nome}, tudo bem?\n\nPassando para lembrar que a ${parc} do nosso contrato, no valor de ${fmt(p.valor)}, vence em ${brDate(p.venc)}.\n\nQualquer dúvida sobre o pagamento, é só me chamar por aqui.\n\nAbraço,\nFortuna AI Advisors`;
  }else if(-dd<=7){
    msg=`Olá, ${nome}, tudo bem?\n\nA ${parc} no valor de ${fmt(p.valor)}, com vencimento em ${brDate(p.venc)}, ainda consta em aberto por aqui.\n\nSe o pagamento já tiver sido feito, pode desconsiderar e me mandar o comprovante. Se preferir, reenvio os dados agora.\n\nAbraço,\nFortuna AI Advisors`;
  }else{
    msg=`Olá, ${nome}, tudo bem?\n\nA ${parc} no valor de ${fmt(p.valor)} venceu em ${brDate(p.venc)} e segue em aberto, já são ${-dd} dias.\n\nPreciso regularizar essa pendência para mantermos o cronograma das entregas em dia. Consegue me confirmar hoje a previsão de pagamento?\n\nFico no aguardo.\n\nAbraço,\nFortuna AI Advisors`;
  }
  const wa=waLink(c.telefone);
  const btn = wa ? `<a class="btn ghost" href="${wa}?text=${encodeURIComponent(msg)}" target="_blank" rel="noopener" style="text-decoration:none;display:inline-flex;align-items:center">Abrir WhatsApp</a>` : "";
  const sub = wa ? `<b>${esc(c.cliente)}</b> · ${esc(parc)} · ${fmt(p.valor)}` : `<b>${esc(c.cliente)}</b> · ${esc(parc)} · ${fmt(p.valor)}<br><span style="color:var(--ink-soft)">Cadastre o WhatsApp do cliente no contrato para abrir a conversa direto.</span>`;
  textoModal("Cobrança",sub,msg,btn);
}
function comentariosModal(cid,idx){
  const c=DB.find(x=>x.id===cid); if(!c)return;
  const e=(c.etapas||[])[idx]; if(!e)return;
  e.coments=e.coments||[];
  const bg=document.createElement("div"); bg.className="modal-bg";
  bg.innerHTML=`<div class="modal" style="max-width:560px"><div class="modal-head"><h2>Comentários da etapa</h2><button class="close-x" data-x>×</button></div>
    <div class="modal-body">
      <div class="scope" style="margin-bottom:14px"><b>${esc(c.cliente)}</b><br>${esc(e.nome)}</div>
      <div class="cmt-list" id="cmtList"></div>
      <div class="field"><label>Quem está falando</label><select id="cmtAutor">${MEMBROS.map(m=>`<option value="${esc(m.nome)}">${esc(m.nome)}${m.apelido?" ("+esc(m.apelido)+")":""}</option>`).join("")}</select></div>
      <div class="field"><label>Comentário</label><textarea id="cmtTxt" rows="3" placeholder="Escreva o alinhamento desta entrega..."></textarea></div>
    </div>
    <div class="modal-foot"><button class="btn ghost" data-x>Fechar</button><button class="btn" id="cmtSend">Enviar</button></div></div>`;
  $("#modalMount").appendChild(bg);
  const draw=()=>{ const box=bg.querySelector("#cmtList");
    box.innerHTML=e.coments.length?e.coments.map(k=>`<div class="cmt"><div class="cmt-top"><span class="cmt-autor">${esc(k.autor||"—")}</span><span class="cmt-data">${esc(k.em||"")}</span></div><div class="cmt-txt">${esc(k.txt)}</div></div>`).join(""):`<div class="cmt-vazio">Nenhum comentário ainda. Comece o alinhamento por aqui.</div>`;
    box.scrollTop=box.scrollHeight; };
  draw();
  bg.querySelectorAll("[data-x]").forEach(b=>b.onclick=()=>bg.remove());
  bg.onclick=ev=>{if(ev.target===bg)bg.remove();};
  bg.querySelector("#cmtSend").onclick=async()=>{
    const ta=bg.querySelector("#cmtTxt"); const txt=ta.value.trim(); if(!txt)return;
    const autor=bg.querySelector("#cmtAutor").value||"—";
    const d=new Date();
    e.coments.push({autor,txt,em:d.toLocaleDateString("pt-BR")+" "+d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})});
    const btn=bg.querySelector("#cmtSend"); btn.disabled=true;
    try{ await Store.patchContract(c); ta.value=""; draw(); softRefresh(cid); }
    catch(err){ e.coments.pop(); toast("Erro ao enviar comentário",true); }
    finally{ btn.disabled=false; }
  };
}

/* ---------- fundo animado (rede tech/IA) na tela de acesso ---------- */
window.BGFX=(function(){
  const canvas=$("#bgfx"); if(!canvas)return {start(){},stop(){}};
  const ctx=canvas.getContext("2d");
  const DPR=Math.min(window.devicePixelRatio||1,2);
  const TAU=6.2831853;
  let W=0,H=0,nodes=[],pulses=[],raf=null,running=false;
  const reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
  function resize(){const r=canvas.getBoundingClientRect();W=canvas.width=Math.max(1,Math.round(r.width*DPR));H=canvas.height=Math.max(1,Math.round(r.height*DPR));}
  function build(){resize();const count=Math.max(20,Math.min(52,Math.floor((W*H)/(38000*DPR))));
    nodes=Array.from({length:count},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*0.16*DPR,vy:(Math.random()-.5)*0.16*DPR,r:(Math.random()*1.5+0.7)*DPR}));pulses=[];}
  const MAXD=()=>150*DPR;
  function spawnPulse(){if(pulses.length>10||!nodes.length)return;const i=(Math.random()*nodes.length)|0,a=nodes[i];let best=-1,bd=MAXD();
    for(let j=0;j<nodes.length;j++){if(j===i)continue;const b=nodes[j],d=Math.hypot(a.x-b.x,a.y-b.y);if(d<bd){bd=d;best=j;}}
    if(best>=0)pulses.push({a:i,b:best,t:0,sp:0.008+Math.random()*0.013});}
  function frame(){
    ctx.clearRect(0,0,W,H);
    for(const n of nodes){n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;}
    const md=MAXD();
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const a=nodes[i],b=nodes[j],d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<md){const o=1-d/md;ctx.strokeStyle="rgba(109,59,245,"+(o*0.26)+")";ctx.lineWidth=DPR*0.8;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}}
    for(const n of nodes){const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*6);g.addColorStop(0,"rgba(124,77,255,0.34)");g.addColorStop(1,"rgba(124,77,255,0)");ctx.fillStyle=g;ctx.beginPath();ctx.arc(n.x,n.y,n.r*6,0,TAU);ctx.fill();
      ctx.fillStyle="rgba(109,59,245,0.85)";ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,TAU);ctx.fill();}
    for(let k=pulses.length-1;k>=0;k--){const p=pulses[k];p.t+=p.sp;const a=nodes[p.a],b=nodes[p.b];if(!a||!b||p.t>=1){pulses.splice(k,1);continue;}
      const x=a.x+(b.x-a.x)*p.t,y=a.y+(b.y-a.y)*p.t,g=ctx.createRadialGradient(x,y,0,x,y,5.5*DPR);g.addColorStop(0,"rgba(46,123,196,0.95)");g.addColorStop(1,"rgba(46,123,196,0)");ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,5.5*DPR,0,TAU);ctx.fill();}
    if(Math.random()<0.06)spawnPulse();
    raf=requestAnimationFrame(frame);
  }
  function start(){if(running)return;running=true;build();frame();if(reduce){running=false;if(raf){cancelAnimationFrame(raf);raf=null;}}}
  function stop(){running=false;if(raf){cancelAnimationFrame(raf);raf=null;}}
  let rt=null;window.addEventListener("resize",()=>{clearTimeout(rt);rt=setTimeout(()=>{if(running){build();}},200);});
  return {start,stop};
})();

(async function boot(){
  refreshModeUI();
  try{ window.BGFX.start(); }catch(e){}
  window.addEventListener("online",updateCloud);
  window.addEventListener("offline",updateCloud);
  try{ await Store.init(); }
  catch(e){ $("#gateErr").textContent="Aviso: "+(e.message||"falha ao conectar. Verifique a configuração do Supabase."); }
  if(!CLOUD)CONNECTED=true;
  renderGateTeam(); updateCloud();
})();
